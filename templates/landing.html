<!DOCTYPE html>
<html>
<head>
    <title>My OTT</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: black;
            color: white;
        }

        .hero {
            position: relative;
            height: 100vh;
            background: url("/static/images/movieslist1.jpg") no-repeat center center/cover;
            display: flex;
            align-items: center;
            padding-left: 60px;
        }

        .hero::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.65);
        }

        .content {
            position: relative;
            z-index: 2;
            max-width: 520px;
        }

        h1 {
            font-size: 56px;
            margin: 0 0 14px;
        }

        p {
            color: #d0d0d0;
            font-size: 20px;
            margin: 0 0 28px;
        }

        .btn {
            display: inline-block;
            padding: 12px 26px;
            border-radius: 25px;
            margin-right: 12px;
            text-decoration: none;
            font-weight: 600;
        }

        .login {
            background: #2d7df6;
            color: white;
        }

        .signup {
            background: white;
            color: black;
        }

        .topbar {
            position: absolute;
            top: 20px;
            right: 40px;
            z-index: 2;
        }

        .topbar a {
            margin-left: 12px;
            color: white;
            text-decoration: none;
            padding: 10px 16px;
            border-radius: 999px;
            background: rgba(255,255,255,0.16);
            backdrop-filter: blur(8px);
        }

        .topbar a:hover {
            background: rgba(255,255,255,0.24);
        }
    </style>
</head>
<body>

<div class="topbar">
    <a href="/login">Sign In</a>
    <a href="/signup">Sign Up</a>
</div>

<div class="hero">
    <div class="content">
        <h1>Welcome to My OTT</h1>
        <p>Watch movies, shows and more in one place.</p>

        <a href="/login" class="btn login">Sign In</a>
        <a href="/signup" class="btn signup">Get Started</a>
    </div>
</div>

</body>
</html>
