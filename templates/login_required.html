<!DOCTYPE html>
<html>
<head>
    <title>Login Required</title>
    <style>
        body {
            margin: 0;
            font-family: -apple-system;
            background: url("/static/images/Hollywood.jpg") no-repeat center/cover;
            height: 100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .overlay {
            background: rgba(0,0,0,0.75);
            padding:40px;
            border-radius:20px;
            color:white;
            text-align:center;
            backdrop-filter: blur(10px);
        }

        a {
            padding:10px 20px;
            border-radius:20px;
            text-decoration:none;
            margin:5px;
            display: inline-block;
        }

        .login { background:white; color:black; }
        .signup { background:rgba(255,255,255,0.2); color:white; }
    </style>
</head>
<body>

<div class="overlay">
    <h1>You're not logged in 😕</h1>
    <p>Please login first</p>
    <p>New to My OTT? Sign up 🚀</p>

    <a href="/login" class="login">Login</a>
    <a href="/signup" class="signup">Sign Up</a>
</div>

</body>
</html>
