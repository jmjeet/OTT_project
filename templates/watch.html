<!DOCTYPE html>
<html>
<head>
    <title>Watch</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: black;
            overflow: hidden; /* 🚀 NO SCROLL */
        }

        video {
            position: fixed;   /* 🔥 makes it stick to screen */
            top: 0;
            left: 0;

            width: 100vw;      /* full width */
            height: 100vh;     /* full height */

            object-fit: cover; /* 🔥 fills screen like OTT */
            background: black;
        }
    </style>
</head>

<body>

<video autoplay controls>
    <source src="{{ url_for('static', filename='videos/' + video) }}">
</video>

</body>
</html>
