<!DOCTYPE html>
<html>
<head>
    <title>Signup</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: -apple-system;
            background: url("/static/images/movieslist2.jpg") no-repeat center/cover;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(3px);
        }

        .login-box {
            position: relative;
            z-index: 2;
            width: 380px;
            padding: 30px;
            border-radius: 18px;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(12px);
            box-shadow: 0 0 40px rgba(0,0,0,0.6);
            color: white;
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
        }

        label {
            font-size: 14px;
            color: #ccc;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 6px;
            margin-bottom: 18px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.1);
            color: white;
        }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: #2d7df6;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        .footer {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            color: #ccc;
        }

        .footer a {
            color: #4da3ff;
            text-decoration: none;
        }

        .error {
            color: #ff7b7b;
            text-align: center;
            margin-bottom: 12px;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Create Account</h2>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST">
        <label>Name</label>
        <input name="name" placeholder="Enter your name" required>

        <label>Email</label>
        <input name="email" placeholder="Enter your email" required>

        <label>Password</label>
        <input type="password" name="password" placeholder="Enter your password" required>

        <button type="submit">Sign Up</button>
    </form>

    <div class="footer">
        Already have an account?
        <a href="/login">Login</a>
    </div>
</div>

</body>
</html>
