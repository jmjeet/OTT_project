<!DOCTYPE html>
<html>
<head>
    <title>Edit Movie #{{ movie.id }}</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: url("/static/images/Hollywood.jpg") no-repeat center/cover;
            min-height: 100vh;
            color: white;
        }
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.75);
            z-index: 0;
        }
        .container {
            position: relative;
            z-index: 2;
            padding: 40px;
            max-width: 800px;
            margin: 0 auto;
        }
        .glass-box {
            background: rgba(0,0,0,0.85);
            padding: 30px;
            border-radius: 18px;
            box-shadow: 0 0 25px rgba(0,0,0,0.7);
        }
        input, textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.15);
            color: white;
        }
        textarea { height: 180px; resize: vertical; }
        label { display: block; margin: 15px 0 5px; color: #ccc; }
        button {
            width: 100%;
            padding: 14px;
            background: #ff4d4d;
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }
        button:hover { background: #e63939; }
        .top-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .logout {
            background: rgba(255,255,255,0.2);
            padding: 8px 15px;
            border-radius: 20px;
            color: white;
            text-decoration: none;
        }
        img { max-width: 150px; border-radius: 8px; margin: 10px 0; }
    </style>
</head>
<body>
<div class="container">
    <div class="top-bar">
        <h2>Edit Movie #{{ movie.id }}</h2>
        <div>
            <a href="/dashboard" class="logout">← Back to Dashboard</a>
            <a href="/logout" class="logout">Logout</a>
        </div>
    </div>

    <div class="glass-box">
        <form method="POST" enctype="multipart/form-data">
            <input name="title" value="{{ movie.title }}" required>

            <label>Current Image</label><br>
            <img src="{{ url_for('static', filename=movie.image) }}" alt="Current Image">

            <label>New Image (optional)</label>
            <input type="file" name="image">

            <label>Current Video: {{ movie.video.split('/')[-1] }}</label>
            <label>New Video (optional)</label>
            <input type="file" name="video">

            <label>Description</label>
            <textarea name="description">{{ movie.description or '' }}</textarea>

            <button type="submit">Update Movie</button>
        </form>
    </div>
</div>
</body>
</html>
