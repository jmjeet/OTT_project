<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: url("/static/images/Hollywood.jpg") no-repeat center/cover;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(3px);
        }

        .login-box {
            position: relative;
            z-index: 2;
            width: 380px;
            padding: 30px;
            border-radius: 18px;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(12px);
            box-shadow: 0 0 40px rgba(0,0,0,0.6);
            color: white;
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            font-weight: 600;
        }

        label {
            font-size: 14px;
            color: #ccc;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 6px;
            margin-bottom: 18px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.1);
            color: white;
            outline: none;
        }

        input::placeholder {
            color: #bbb;
        }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: #ff4d4d;
            color: white;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #e63939;
        }

        .footer {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            color: #ccc;
        }

        .footer a {
            color: #4da3ff;
            text-decoration: none;
        }

        .error {
            color: #ff7b7b;
            text-align: center;
            margin-bottom: 12px;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Admin Panel Login</h2>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST">
        <label>Username</label>
        <input name="username" placeholder="Enter admin username" required>

        <label>Password</label>
        <input type="password" name="password" placeholder="Enter password" required>

        <button type="submit">Login as Admin</button>
    </form>

    <div class="footer">
        Back to <a href="/">Home</a>
    </div>
</div>

</body>
</html>
